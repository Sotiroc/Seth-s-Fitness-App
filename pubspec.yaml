name: fitnessapp
description: 'A personal workout tracker mobile app.'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.28.2
  drift_flutter: ^0.2.5
  flutter_riverpod: ^3.0.3
  go_router: ^16.3.0
  google_fonts: ^6.3.1
  image_picker: ^1.2.0
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^3.0.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.9.0
  custom_lint: ^0.8.1
  drift_dev: ^2.28.1
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true
