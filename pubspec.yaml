name: fitnessapp
description: 'A personal workout tracker mobile app.'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.28.2
  fl_chart: ^1.1.1
  flutter_riverpod: ^3.0.3
  go_router: ^16.3.0
  image: ^4.2.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  riverpod_annotation: ^3.0.3
  sqlite3: ^2.9.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.9.0
  custom_lint: ^0.8.1
  drift_dev: ^2.28.1
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/illustrations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900
